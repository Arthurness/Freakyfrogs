<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimum-scale=1.0">
    <title>Frogfriends</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');
      
        :root {
            --bg-top: #a7f3d0;
            --bg-bottom: #4fac82;
            --accent: #fde047;
            --celestial-top: #1e293b;
            --celestial-bottom: #0f172a;
        }
        body {
            margin: 0;
            overflow: hidden;
            background: #4fac82;
            font-family: 'Gaegu', cursive;
            user-select: none;
            touch-action: none;
            color: white;
        }

        /* Custom Icon Style - matching lily pad aesthetic */
        .custom-icon {
            width: 28px;
            height: 28px;
            display: inline-block;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
        }

        #title-screen, #pond-container, .modal-content, .admin-panel { /* existing styles unchanged */ }
        /* ... (all your existing styles remain the same) ... */
    </style>
</head>
<body>
<div id="title-screen">
    <div class="title-container">
        <h1 class="main-title">Frogfriends</h1>
        <div id="random-subtitle" class="sub-title">Totoro-lly awesome!</div>
        <br>
        <button class="start-btn" onclick="startGame()">Start Journey</button>
    </div>
</div>

<div id="zen-exit-detector"></div>

<div id="pond-container" onclick="handlePondClick(event)">
    <!-- ... existing content ... -->

    <div class="absolute top-10 left-20 ui-element">
        <div class="flex items-baseline gap-3">
            <span class="text-7xl font-bold drop-shadow-lg" id="score">0</span>
            <span class="text-2xl text-yellow-300 font-bold" id="multiplier">x1.0</span>
        </div>
        <div class="text-xl opacity-80 uppercase tracking-widest flex items-center gap-2">
            <span id="evo-name">Morning Marsh</span>
            <span id="weather-icon" class="custom-icon"></span>
        </div>
        <div id="evo-desc" class="text-xs opacity-60 max-w-xs italic leading-tight mt-1">A quiet, humble beginning.</div>
    </div>

    <div class="absolute top-40 right-10 ui-element">
        <button onclick="toggleZen(true)" class="group bg-white/10 hover:bg-white/20 px-8 py-4 rounded-full border border-white/30 text-lg backdrop-blur-xl transition-all flex items-center gap-3">
            <span id="zen-icon" class="custom-icon"></span>
            Enter Spirit Realm
        </button>
    </div>

    <!-- Rest of your HTML remains the same until the admin panel -->
    
    <!-- ADMIN PANEL -->
    <div id="admin-panel" class="modal-overlay" style="display: none;">
        <div class="admin-panel">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-yellow-300 flex items-center gap-3">
                    <span id="admin-frog-icon" class="custom-icon" style="width:36px;height:36px"></span>
                    FROGO ADMIN PANEL
                </h2>
                <button onclick="closeAdminPanel()" class="text-4xl opacity-70 hover:opacity-100">&times;</button>
            </div>
            <!-- rest unchanged -->
        </div>
    </div>
</div>

<script>
    // ==================== CUSTOM ICONS (Lily Pad Style) ====================

    function getSunIcon() {
        return `<svg viewBox="0 0 100 100" class="custom-icon">
            <circle cx="50" cy="50" r="28" fill="#fde047" stroke="#f59e0b" stroke-width="8"/>
            <g stroke="#f59e0b" stroke-width="6" stroke-linecap="round">
                <line x1="50" y1="12" x2="50" y2="28"/>
                <line x1="50" y1="72" x2="50" y2="88"/>
                <line x1="12" y1="50" x2="28" y2="50"/>
                <line x1="72" y1="50" x2="88" y2="50"/>
                <line x1="23" y1="23" x2="35" y2="35"/>
                <line x1="65" y1="65" x2="77" y2="77"/>
                <line x1="23" y1="77" x2="35" y2="65"/>
                <line x1="65" y1="35" x2="77" y2="23"/>
            </g>
        </svg>`;
    }

    function getRainIcon() {
        return `<svg viewBox="0 0 100 100" class="custom-icon">
            <path d="M25 35 Q35 20 50 25 Q65 20 75 35" fill="#93c5fd" stroke="#64748b" stroke-width="8"/>
            <circle cx="35" cy="55" r="5" fill="#bae6fd"/>
            <circle cx="50" cy="65" r="5" fill="#bae6fd"/>
            <circle cx="70" cy="58" r="5" fill="#bae6fd"/>
            <line x1="35" y1="62" x2="35" y2="78" stroke="#bae6fd" stroke-width="4" stroke-linecap="round"/>
            <line x1="50" y1="72" x2="50" y2="88" stroke="#bae6fd" stroke-width="4" stroke-linecap="round"/>
            <line x1="70" y1="65" x2="70" y2="81" stroke="#bae6fd" stroke-width="4" stroke-linecap="round"/>
        </svg>`;
    }

    function getSnowIcon() {
        return `<svg viewBox="0 0 100 100" class="custom-icon">
            <circle cx="50" cy="42" r="22" fill="#e0f2fe" stroke="#64748b" stroke-width="8"/>
            <g fill="#f0f9ff" stroke="#64748b" stroke-width="3">
                <circle cx="50" cy="42" r="8"/>
                <path d="M42 32 L50 22 L58 32"/>
                <path d="M38 48 L30 55 L42 62"/>
                <path d="M62 48 L70 55 L58 62"/>
            </g>
        </svg>`;
    }

    function getSparkleIcon() {
        return `<svg viewBox="0 0 100 100" class="custom-icon">
            <path d="M50 15 L58 38 L85 42 L65 60 L70 85 L50 72 L30 85 L35 60 L15 42 L42 38 Z" 
                fill="#fef08c" stroke="#eab308" stroke-width="8" opacity="0.9"/>
            <circle cx="50" cy="50" r="12" fill="#fefce8"/>
        </svg>`;
    }

    function getFrogIcon() {
        return `<svg viewBox="0 0 100 100" class="custom-icon">
            <ellipse cx="50" cy="58" rx="32" ry="25" fill="#4ade80" stroke="#166534" stroke-width="6"/>
            <circle cx="35" cy="45" r="10" fill="#4ade80"/>
            <circle cx="65" cy="45" r="10" fill="#4ade80"/>
            <circle cx="35" cy="45" r="4" fill="#052e16"/>
            <circle cx="65" cy="45" r="4" fill="#052e16"/>
        </svg>`;
    }

    // Update weather icon
    function updateWeatherIcon() {
        const iconContainer = document.getElementById('weather-icon');
        if (state.weather === 'rain') {
            iconContainer.innerHTML = getRainIcon();
        } else if (state.weather === 'snow') {
            iconContainer.innerHTML = getSnowIcon();
        } else {
            iconContainer.innerHTML = getSunIcon();
        }
    }

    // Update zen icon
    function updateZenIcon() {
        document.getElementById('zen-icon').innerHTML = getSparkleIcon();
    }

    // Update admin frog icon
    function updateAdminIcon() {
        document.getElementById('admin-frog-icon').innerHTML = getFrogIcon();
    }

    // Modify your existing randomizeWeather function
    function randomizeWeather() {
        const types = ['idle', 'rain', 'snow'];
        state.weather = types[Math.floor(Math.random() * types.length)];
        const fx = document.getElementById('fx-layer'); 
        fx.innerHTML = '';
        
        updateWeatherIcon();
        
        if (state.weather === 'rain') {
            for(let i=0; i<40; i++) {
                const d = document.createElement('div'); 
                d.className = 'rain-drop';
                d.style.left = Math.random() * 100 + 'vw'; 
                d.style.animationDelay = Math.random() + 's';
                fx.appendChild(d);
            }
        } else if (state.weather === 'snow') {
            for(let i=0; i<30; i++) {
                const f = document.createElement('div'); 
                f.className = 'snow-flake';
                const s = 4 + Math.random()*6; 
                f.style.width = s+'px'; 
                f.style.height = s+'px';
                f.style.left = Math.random()*100+'vw'; 
                f.style.animationDelay = Math.random()*3+'s';
                fx.appendChild(f);
            }
        }
    }

    // Call these on load and when needed
    window.onload = () => {
        pickRandomSubtitle();
        initTitleDeco();
        updateUI();
        updateZenIcon();
        updateAdminIcon();
        updateWeatherIcon(); // initial sun
    };

    // Also call updateWeatherIcon() inside evolve() and toggleZen if needed
</script>
</body>
</html>
